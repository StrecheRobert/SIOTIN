<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platforma IoT SIOTIN</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --card-2: #f8fafc;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --warning: #d97706;
      --warning-soft: #fef3c7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 250px 1fr;
    }

    .sidebar {
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: white;
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb, #14b8a6);
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .brand h1 { margin: 0; font-size: 1rem; }
    .brand p { margin: 4px 0 0; font-size: 0.82rem; color: #94a3b8; }

    .nav { display: grid; gap: 8px; }
    .nav button {
      border: 0;
      background: transparent;
      color: #dbe4f0;
      text-align: left;
      padding: 12px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .nav button:hover, .nav button.active {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: rgba(245,247,251,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .topbar h2 { margin: 0; font-size: 1.3rem; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--success-soft);
      color: var(--success);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.86rem;
    }

    .content { padding: 24px; display: grid; gap: 20px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-header h3 { margin: 0; font-size: 1.05rem; }
    .grid { display: grid; gap: 18px; }
    .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .widgets-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .small-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .metric-card {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #fff 0%, #f8fbff 100%);
      border-radius: 18px;
      padding: 18px;
    }

    .metric-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .metric-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 1.4rem;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .metric-label { color: var(--muted); font-size: 0.9rem; margin-bottom: 6px; }
    .metric-value { font-size: 1.9rem; font-weight: 800; }

    .badge {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .normal { background: var(--success-soft); color: var(--success); }
    .warning { background: var(--warning-soft); color: var(--warning); }
    .critical { background: var(--danger-soft); color: var(--danger); }
    .neutral { background: #e2e8f0; color: #475569; }

    .muted { color: var(--muted); }

    .list { display: grid; gap: 12px; }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card-2);
    }

    .form-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      color: #334155;
    }

    .input, .select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      background: white;
      color: var(--text);
    }

    .button, .button-outline {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .button { background: var(--primary); color: white; }
    .button-outline { background: white; color: var(--text); border: 1px solid var(--border); }

    .switch {
      position: relative;
      width: 52px;
      height: 30px;
      display: inline-block;
    }

    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #cbd5e1;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      top: 4px;
      left: 4px;
      border-radius: 50%;
      background: white;
      transition: 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }

    .switch input:checked + .slider { background: var(--primary); }
    .switch input:checked + .slider::before { transform: translateX(22px); }

    .chart-wrap {
      height: 320px;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    canvas { width: 100%; height: 100%; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--border); }
    th { font-size: 0.82rem; color: var(--muted); text-transform: uppercase; }

    .page { display: none; }
    .page.active { display: block; }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      background: #0f172a;
      color: white;
      padding: 14px 16px;
      border-radius: 14px;
      box-shadow: 0 12px 26px rgba(15,23,42,0.25);
      opacity: 0;
      transform: translateY(10px);
      transition: 0.25s ease;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .cards-grid, .widgets-grid, .small-grid, .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">IoT</div>
        <div>
          <h1>Platforma Demo</h1>
          <p>Monitorizare</p>
        </div>
      </div>

      <div class="nav">
        <button class="active" data-page="dashboard">Dashboard</button>
        <button data-page="monitorizare">Monitorizare</button>
        <button data-page="widgeturi">Dashboard</button>
        <button data-page="senzori">Senzori</button>
        <button data-page="actuatori">Actuatori</button>
        <button data-page="alerte">Alerte</button>
        <button data-page="setari">Setari</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="titluPagina">Dashboard</h2>
        </div>
        <div class="status-pill">● Online</div>
      </header>

      <div class="content">
        <section id="pagina-dashboard" class="page active">
          <div class="section-header">
            <div>
              <h3>Dashboard</h3>
            </div>
            <div class="muted">Update: <strong id="ultimaActualizare">--</strong></div>
          </div>

          <div id="dashboardCards" class="grid cards-grid"></div>

          <div class="grid small-grid">
            <div class="card">
              <div class="section-header"><div><h3>Stare senzori</h3></div></div>
              <div id="stareSenzori" class="list"></div>
            </div>

            <div class="card">
              <div class="section-header"><div><h3>Alerte</h3></div></div>
              <div id="alerteActiveDashboard" class="list"></div>
            </div>
          </div>
        </section>

        <section id="pagina-monitorizare" class="page">
          <div class="card">
            <div class="section-header">
              <div><h3>Monitorizare</h3></div>
              <div style="display:flex; gap:18px; flex-wrap:wrap; align-items:flex-start;">
                <div style="display:grid; gap:8px; min-width:220px;">
                  <label><input type="checkbox" class="metric-check" value="temperatura" checked> Temperatura aer</label>
                  <label><input type="checkbox" class="metric-check" value="umiditateSol" checked> Umiditate sol</label>
                </div>
                <button class="button-outline" id="btnLive">Actualizeaza</button>
              </div>
            </div>
            <div class="chart-wrap">
              <canvas id="chart"></canvas>
            </div>
          </div>
        </section>

        <section id="pagina-widgeturi" class="page">
          <div class="card">
            <div class="section-header"><div><h3>Dashboard</h3></div></div>
            <div id="listaWidgeturi" class="grid widgets-grid"></div>
          </div>
        </section>

        <section id="pagina-senzori" class="page">
          <div class="card">
            <div class="section-header"><div><h3>Senzori</h3></div></div>
            <div style="overflow:auto;">
              <table>
                <thead>
                  <tr>
                    <th>Nume senzor</th>
                    <th>Tip</th>
                    <th>Locatie</th>
                    <th>Status</th>
                    <th>Ultima valoare</th>
                  </tr>
                </thead>
                <tbody id="tabelSenzori"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section id="pagina-actuatori" class="page">
          <div class="card">
            <div class="section-header"><div><h3>Actuatori</h3></div></div>
            <div id="listaActuatori" class="grid widgets-grid"></div>
          </div>
        </section>

        <section id="pagina-alerte" class="page">
          <div class="grid small-grid">
            <div class="card">
              <div class="section-header"><div><h3>Praguri</h3></div></div>
              <div class="form-grid">
                <div class="field">
                  <label>Temperatura warning</label>
                  <input id="tempWarn" class="input" type="number" value="30" />
                </div>
                <div class="field">
                  <label>Temperatura critical</label>
                  <input id="tempCrit" class="input" type="number" value="35" />
                </div>
                <div class="field">
                  <label>Umiditate sol warning</label>
                  <input id="soilWarn" class="input" type="number" value="35" />
                </div>
                <div class="field">
                  <label>Umiditate sol critical</label>
                  <input id="soilCrit" class="input" type="number" value="25" />
                </div>
              </div>
              <div style="margin-top:14px; display:flex; justify-content:flex-end;">
                <button class="button" id="salveazaPraguri">Salveaza</button>
              </div>
            </div>

            <div class="card">
              <div class="section-header"><div><h3>Alerte</h3></div></div>
              <div id="listaAlerte" class="list"></div>
            </div>
          </div>
        </section>

        <section id="pagina-setari" class="page">
          <div class="card">
            <div class="section-header"><div><h3>Setari</h3></div></div>
            <div class="list">
              <div class="list-item"><span>Mod simplificat</span><span class="badge normal">Activ</span></div>
              <div class="list-item"><span>Date demo</span><span class="badge neutral">Local</span></div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const state = {
      pagina: 'dashboard',
      metricSelectat: ['temperatura', 'umiditateSol'],
      praguri: {
        temperatura: { warning: 30, critical: 35 },
        umiditateSol: { warning: 35, critical: 25 }
      },
      senzori: [
        { id: 1, nume: 'Senzor Temperatura Aer', tip: 'temperatura', locatie: 'Sera 1', status: 'online', valoare: 24.6, unitate: '°C' },
        { id: 2, nume: 'Senzor Umiditate Sol', tip: 'umiditateSol', locatie: 'Parcela 1', status: 'online', valoare: 41, unitate: '%' }
      ],
      actuatori: [
        { id: 1, nume: 'Pompa irigare', status: false, mod: 'automat', start: '06:00', stop: '06:20' },
        { id: 2, nume: 'Ventilator sera', status: false, mod: 'manual', start: '12:00', stop: '14:00' },
        { id: 3, nume: 'Iluminare', status: false, mod: 'manual', start: '19:00', stop: '22:00' }
      ],
      widgeturi: [
        { key: 'temperaturaCard', label: 'Card temperatura aer', activ: true },
        { key: 'umiditateCard', label: 'Card umiditate sol', activ: true },
        { key: 'stareSenzori', label: 'Widget stare senzori', activ: true },
        { key: 'alerte', label: 'Widget alerte', activ: true }
      ],
      istoric: {
        temperatura: [],
        umiditateSol: []
      },
      alerte: []
    };

    const metaPagini = {
      dashboard: 'Dashboard',
      monitorizare: 'Monitorizare',
      widgeturi: 'Dashboard',
      senzori: 'Senzori',
      actuatori: 'Actuatori',
      alerte: 'Alerte',
      setari: 'Setari'
    };

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function formatData() {
      return new Date().toLocaleString('ro-RO');
    }

    function statusMetric(tip, valoare) {
      const p = state.praguri[tip];
      if (tip === 'umiditateSol') {
        if (valoare <= p.critical) return 'critical';
        if (valoare <= p.warning) return 'warning';
        return 'normal';
      }
      if (valoare >= p.critical) return 'critical';
      if (valoare >= p.warning) return 'warning';
      return 'normal';
    }

    function etichetaStatus(status) {
      return status === 'critical' ? 'critical' : status === 'warning' ? 'warning' : 'normal';
    }

    function getValoare(tip) {
      return state.senzori.find(s => s.tip === tip)?.valoare || 0;
    }

    function renderDashboard() {
      const box = document.getElementById('dashboardCards');
      const cards = [];

      if (state.widgeturi.find(w => w.key === 'temperaturaCard')?.activ) {
        const v = getValoare('temperatura');
        const st = statusMetric('temperatura', v);
        cards.push(`
          <div class="metric-card">
            <div class="metric-top">
              <div>
                <div class="metric-label">Temperatura aer</div>
                <div class="metric-value">${v.toFixed(1)} °C</div>
              </div>
              <div class="metric-icon">🌡️</div>
            </div>
            <div style="margin-top:12px;"><span class="badge ${st}">${etichetaStatus(st)}</span></div>
          </div>
        `);
      }

      if (state.widgeturi.find(w => w.key === 'umiditateCard')?.activ) {
        const v = getValoare('umiditateSol');
        const st = statusMetric('umiditateSol', v);
        cards.push(`
          <div class="metric-card">
            <div class="metric-top">
              <div>
                <div class="metric-label">Umiditate sol</div>
                <div class="metric-value">${v.toFixed(0)} %</div>
              </div>
              <div class="metric-icon">🌱</div>
            </div>
            <div style="margin-top:12px;"><span class="badge ${st}">${etichetaStatus(st)}</span></div>
          </div>
        `);
      }

      box.innerHTML = cards.join('') || '<div class="card">Gol</div>';

      const stareBox = document.getElementById('stareSenzori');
      const alerteBox = document.getElementById('alerteActiveDashboard');
      const cardStare = state.widgeturi.find(w => w.key === 'stareSenzori')?.activ;
      const cardAlerte = state.widgeturi.find(w => w.key === 'alerte')?.activ;

      stareBox.innerHTML = cardStare ? state.senzori.map(s => `
        <div class="list-item">
          <span>${s.nume}</span>
          <span class="badge ${s.status === 'online' ? 'normal' : 'neutral'}">${s.status}</span>
        </div>
      `).join('') : '<div class="list-item"><span>Ascuns</span></div>';

      alerteBox.innerHTML = cardAlerte
        ? (state.alerte.length
            ? state.alerte.map(a => `
                <div class="list-item">
                  <div>
                    <strong>${a.titlu}</strong>
                    <div class="muted">${a.mesaj}</div>
                  </div>
                  <span class="badge ${a.nivel}">${a.nivel}</span>
                </div>
              `).join('')
            : '<div class="list-item"><span>Fara alerte</span><span class="badge normal">ok</span></div>')
        : '<div class="list-item"><span>Ascuns</span></div>';

      document.getElementById('ultimaActualizare').textContent = formatData();
    }

    function renderWidgeturi() {
      const box = document.getElementById('listaWidgeturi');
      box.innerHTML = state.widgeturi.map(w => `
        <div class="list-item">
          <div><strong>${w.label}</strong></div>
          <label class="switch">
            <input type="checkbox" ${w.activ ? 'checked' : ''} onchange="toggleWidget('${w.key}', this.checked)">
            <span class="slider"></span>
          </label>
        </div>
      `).join('');
    }

    function toggleWidget(key, value) {
      const w = state.widgeturi.find(x => x.key === key);
      if (!w) return;
      w.activ = value;
      renderDashboard();
      renderWidgeturi();
      toast('Dashboard actualizat');
    }

    function renderSenzori() {
      document.getElementById('tabelSenzori').innerHTML = state.senzori.map(s => `
        <tr>
          <td>${s.nume}</td>
          <td>${s.tip === 'temperatura' ? 'Temperatura aer' : 'Umiditate sol'}</td>
          <td>${s.locatie}</td>
          <td><span class="badge ${s.status === 'online' ? 'normal' : 'neutral'}">${s.status}</span></td>
          <td>${s.valoare} ${s.unitate}</td>
        </tr>
      `).join('');
    }

    function renderActuatori() {
      const box = document.getElementById('listaActuatori');
      box.innerHTML = state.actuatori.map(a => `
        <div class="metric-card">
          <div class="metric-top">
            <div>
              <div class="metric-label">${a.nume}</div>
              <div class="metric-value" style="font-size:1.3rem;">${a.status ? 'Pornit' : 'Oprit'}</div>
            </div>
            <div class="metric-icon">${a.nume.includes('Pompa') ? '💧' : a.nume.includes('Ventilator') ? '🌀' : '💡'}</div>
          </div>

          <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center; gap:12px;">
            <span class="badge ${a.status ? 'normal' : 'neutral'}">${a.status ? 'activ' : 'inactiv'}</span>
            <label class="switch">
              <input type="checkbox" ${a.status ? 'checked' : ''} onchange="toggleActuator(${a.id}, this.checked)">
              <span class="slider"></span>
            </label>
          </div>

          <div class="form-grid" style="margin-top:14px;">
            <div class="field">
              <label>Mod</label>
              <select class="select" onchange="setModeActuator(${a.id}, this.value)">
                <option value="manual" ${a.mod === 'manual' ? 'selected' : ''}>Manual</option>
                <option value="automat" ${a.mod === 'automat' ? 'selected' : ''}>Automat</option>
              </select>
            </div>
            <div></div>
            <div class="field">
              <label>Start</label>
              <input class="input" type="time" value="${a.start}" onchange="setScheduleActuator(${a.id}, 'start', this.value)">
            </div>
            <div class="field">
              <label>Stop</label>
              <input class="input" type="time" value="${a.stop}" onchange="setScheduleActuator(${a.id}, 'stop', this.value)">
            </div>
          </div>
        </div>
      `).join('');
    }

    function toggleActuator(id, value) {
      const a = state.actuatori.find(x => x.id === id);
      if (!a) return;
      a.status = value;
      renderActuatori();
      toast(`${a.nume} ${value ? 'pornit' : 'oprit'}`);
    }

    function setModeActuator(id, value) {
      const a = state.actuatori.find(x => x.id === id);
      if (!a) return;
      a.mod = value;
      toast(`${a.nume} ${value}`);
    }

    function setScheduleActuator(id, field, value) {
      const a = state.actuatori.find(x => x.id === id);
      if (!a) return;
      a[field] = value;
      toast(`${a.nume} actualizat`);
    }

    function evalueazaAlerte() {
      const alerte = [];
      const temp = getValoare('temperatura');
      const soil = getValoare('umiditateSol');

      const stTemp = statusMetric('temperatura', temp);
      const stSoil = statusMetric('umiditateSol', soil);

      if (stTemp !== 'normal') {
        alerte.push({ titlu: 'Temperatura', mesaj: `${temp.toFixed(1)} °C`, nivel: stTemp });
      }
      if (stSoil !== 'normal') {
        alerte.push({ titlu: 'Umiditate sol', mesaj: `${soil.toFixed(0)} %`, nivel: stSoil });
      }

      state.alerte = alerte;
      renderAlerte();
      renderDashboard();
    }

    function renderAlerte() {
      const box = document.getElementById('listaAlerte');
      if (!state.alerte.length) {
        box.innerHTML = '<div class="list-item"><span>Fara alerte</span><span class="badge normal">ok</span></div>';
        return;
      }
      box.innerHTML = state.alerte.map(a => `
        <div class="list-item">
          <div>
            <strong>${a.titlu}</strong>
            <div class="muted">${a.mesaj}</div>
          </div>
          <span class="badge ${a.nivel}">${a.nivel}</span>
        </div>
      `).join('');
    }

    function initIstoric() {
      for (let i = 0; i < 18; i++) {
        state.istoric.temperatura.push(22 + Math.random() * 5);
        state.istoric.umiditateSol.push(34 + Math.random() * 12);
      }
    }

    function drawChart() {
      const canvas = document.getElementById('chart');
      const ctx = canvas.getContext('2d');
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, rect.width, rect.height);

      const selected = state.metricSelectat.length ? state.metricSelectat : ['temperatura'];
      const seriesMap = {
        temperatura: { values: state.istoric.temperatura.map(v => Number(v.toFixed(1))), color: '#2563eb' },
        umiditateSol: { values: state.istoric.umiditateSol.map(v => Number(v.toFixed(1))), color: '#16a34a' }
      };

      const allValues = selected.flatMap(key => seriesMap[key].values);
      const padding = { top: 20, right: 18, bottom: 34, left: 42 };
      const width = rect.width - padding.left - padding.right;
      const height = rect.height - padding.top - padding.bottom;
      const max = Math.max(...allValues) * 1.15;
      const min = Math.min(...allValues) * 0.85;
      const length = seriesMap[selected[0]].values.length;
      const stepX = width / Math.max(length - 1, 1);

      ctx.strokeStyle = '#dbe6f2';
      ctx.lineWidth = 1;
      ctx.fillStyle = '#64748b';
      ctx.font = '12px Inter, sans-serif';

      for (let i = 0; i <= 4; i++) {
        const y = padding.top + (height / 4) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(padding.left + width, y);
        ctx.stroke();
      }

      for (let i = 0; i < length; i++) {
        if (i % 3 !== 0) continue;
        const x = padding.left + i * stepX;
        ctx.fillText(String(i + 1), x - 4, rect.height - 10);
      }

      selected.forEach(key => {
        const { values, color } = seriesMap[key];
        ctx.beginPath();
        values.forEach((value, i) => {
          const x = padding.left + i * stepX;
          const y = padding.top + height - ((value - min) / (max - min || 1)) * height;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();

        values.forEach((value, i) => {
          const x = padding.left + i * stepX;
          const y = padding.top + height - ((value - min) / (max - min || 1)) * height;
          ctx.beginPath();
          ctx.arc(x, y, 3.5, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
        });
      });
    }

    function updateLiveData() {
      const tempSensor = state.senzori.find(s => s.tip === 'temperatura');
      const soilSensor = state.senzori.find(s => s.tip === 'umiditateSol');

      tempSensor.valoare = +(tempSensor.valoare + (Math.random() - 0.45) * 0.8).toFixed(1);
      soilSensor.valoare = Math.max(0, +(soilSensor.valoare + (Math.random() - 0.6) * 2).toFixed(0));

      state.istoric.temperatura.shift();
      state.istoric.umiditateSol.shift();
      state.istoric.temperatura.push(tempSensor.valoare);
      state.istoric.umiditateSol.push(soilSensor.valoare);

      renderSenzori();
      evalueazaAlerte();
      drawChart();
    }

    function schimbaPagina(pagina) {
      state.pagina = pagina;
      document.querySelectorAll('.nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.page === pagina));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('pagina-' + pagina).classList.add('active');
      document.getElementById('titluPagina').textContent = metaPagini[pagina];
      if (pagina === 'monitorizare') setTimeout(drawChart, 30);
    }

    function initEvents() {
      document.querySelectorAll('.nav button').forEach(btn => {
        btn.addEventListener('click', () => schimbaPagina(btn.dataset.page));
      });

      document.querySelectorAll('.metric-check').forEach(check => {
        check.addEventListener('change', () => {
          state.metricSelectat = Array.from(document.querySelectorAll('.metric-check:checked')).map(x => x.value);
          drawChart();
        });
      });

      document.getElementById('btnLive').addEventListener('click', () => {
        drawChart();
        toast('Grafic actualizat');
      });

      document.getElementById('salveazaPraguri').addEventListener('click', () => {
        state.praguri.temperatura.warning = Number(document.getElementById('tempWarn').value);
        state.praguri.temperatura.critical = Number(document.getElementById('tempCrit').value);
        state.praguri.umiditateSol.warning = Number(document.getElementById('soilWarn').value);
        state.praguri.umiditateSol.critical = Number(document.getElementById('soilCrit').value);
        evalueazaAlerte();
        toast('Praguri salvate');
      });

      window.addEventListener('resize', () => {
        if (state.pagina === 'monitorizare') drawChart();
      });
    }

    function init() {
      initIstoric();
      renderWidgeturi();
      renderSenzori();
      renderActuatori();
      evalueazaAlerte();
      renderDashboard();
      initEvents();
      document.getElementById('ultimaActualizare').textContent = formatData();
      setTimeout(drawChart, 30);
      setInterval(updateLiveData, 10000);
    }

    init();
  </script>
</body>
</html>
